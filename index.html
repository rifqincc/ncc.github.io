<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem HPP & Recipe Card - NARA Group</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        darkbg: '#0f172a', 
                        darkcard: '#1e293b' 
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50 dark:bg-darkbg text-gray-800 dark:text-gray-200 transition-colors duration-300">

    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-gradient-to-br from-blue-900 to-indigo-900 dark:from-slate-900 dark:to-slate-800 p-4 transition-opacity duration-500">
        <div class="bg-white dark:bg-darkcard rounded-3xl shadow-2xl w-full max-w-md p-8 relative border border-gray-100 dark:border-slate-700">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center p-3 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 shadow-lg mb-4">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-black text-gray-800 dark:text-white tracking-tight">NARA Group</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Sistem Manajemen HPP & Recipe Card</p>
                <p class="text-xs text-blue-600 dark:text-blue-400 mt-1 font-bold">CV. Narasi Asa Ruang Aksi</p>
            </div>
            
            <form id="login-form" onsubmit="event.preventDefault(); loginAdmin()" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-600 dark:text-gray-300 mb-1.5">Email</label>
                    <input type="email" id="login-email" placeholder="email@domain.com" class="w-full p-3 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-xl focus:bg-white dark:focus:bg-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white" required />
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 dark:text-gray-300 mb-1.5">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" class="w-full p-3 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-xl focus:bg-white dark:focus:bg-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white" required />
                </div>
                <button id="btn-submit-login" type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-bold text-lg hover:shadow-lg hover:-translate-y-0.5 transition-all">Masuk</button>
            </form>
        </div>
    </div>

    <div id="app-wrapper" class="hidden">
        
        <nav class="bg-white dark:bg-darkcard border-b border-gray-200 dark:border-slate-700 sticky top-0 z-40 shadow-sm transition-colors">
            <div class="max-w-7xl mx-auto px-4 sm:px-6">
                <div class="flex items-center justify-between h-16">
                    
                    <div class="flex-shrink-0 flex items-center gap-3">
                        <div class="bg-gradient-to-br from-blue-600 to-indigo-600 p-2 rounded-lg shadow-md">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        </div>
                        <div class="flex flex-col hidden sm:flex">
                            <span class="text-sm font-black text-gray-900 dark:text-white leading-none">NARA</span>
                            <span class="text-[9px] font-bold tracking-widest text-blue-600 dark:text-blue-400 uppercase leading-tight">F&B Pro</span>
                        </div>
                    </div>

                    <div class="flex-1 overflow-x-auto hide-scrollbar mx-2 sm:mx-6">
                        <div class="flex space-x-2 sm:space-x-6 min-w-max items-center h-full px-2" id="navbar-tabs">
                            </div>
                    </div>

                    <div class="flex-shrink-0 flex items-center gap-3 border-l border-gray-200 dark:border-slate-700 pl-4">
                        <span id="user-status" class="hidden md:inline-flex text-xs font-bold text-blue-700 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/50 px-3 py-1.5 rounded-full border border-blue-200 dark:border-blue-800">🌟 Loading...</span>
                        <button id="btn-logout" onclick="logoutAdmin()" class="bg-gradient-to-r from-red-600 to-red-500 hover:from-red-700 hover:to-red-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow transition-all">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 sm:p-6" id="main-content">
            
            <div id="tab-settings" class="tab-content">
                <div class="bg-white dark:bg-darkcard p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700 mb-6 transition-colors">
                    <h3 class="font-bold text-gray-800 dark:text-white text-lg mb-4 border-b border-gray-100 dark:border-slate-700 pb-2 flex items-center gap-2">
                        <span>🎨</span> Pengaturan Tampilan
                    </h3>
                    <div class="max-w-sm">
                        <label class="block text-sm font-bold text-gray-600 dark:text-gray-300 mb-2">Tema Aplikasi</label>
                        <select id="theme-setting" class="w-full p-3 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white">
                            <option value="light">☀️ Terang (Light Mode)</option>
                            <option value="dark">🌙 Gelap (Dark Mode)</option>
                            <option value="auto">🖥️ Otomatis (Sistem)</option>
                        </select>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Pilih mode gelap agar tidak silau saat penggunaan di area operasional atau kafe.</p>
                    </div>
                </div>
                </div>

        </main>
    </div>
</body>
</html>
